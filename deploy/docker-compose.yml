version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: koosha
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes: [dbdata:/var/lib/postgresql/data]
  redis:
    image: redis:7
  api:
    build: ../backend
    environment:
      DJANGO_DEBUG: 'false'
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me}
      DB_HOST: db
      DB_NAME: koosha
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379/0
    depends_on: [db, redis]
  web:
    build: ../website
    environment:
      NEXT_PUBLIC_API_BASE: http://api:8000
    depends_on: [api]
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports: ["80:80"]
    depends_on: [web]
volumes: { dbdata: {} }
